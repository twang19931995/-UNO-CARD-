<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>卡牌精准算分器</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { margin: 0; background: #111; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { padding: 10px; text-align: center; background: #222; z-index: 10; }
        .header h2 { margin: 0; color: #4CAF50; font-size: 18px; }
        .scanner-container { position: relative; width: 100%; flex: 1; display: flex; justify-content: center; align-items: center; background: #000; overflow: hidden; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; }
        .scan-box { position: absolute; top: 25%; width: 80%; height: 70px; border: 3px solid #ff3b30; border-radius: 8px; box-sizing: border-box; z-index: 2; box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.7); }
        .scan-line { width: 100%; height: 2px; background: #ff3b30; position: absolute; animation: scan 1.5s infinite linear; }
        @keyframes scan { 0% { top: 0; opacity: 0;} 10% { opacity: 1;} 90% { opacity: 1;} 100% { top: 100%; opacity: 0;} }
        .result-panel { width: 100%; height: 180px; background: #222; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 10px; box-sizing: border-box; z-index: 10; }
        .score-display { font-size: 56px; font-weight: bold; color: #ffcc00; margin: 0; }
        .details { color: #aaa; font-size: 16px; margin-top: 5px; }
        .status { color: #4CAF50; font-size: 12px; margin-top: 10px; }
        /* 调试用的画布，能让你看到AI眼里的画面 */
        #debugCanvas { position: absolute; top: 10px; right: 10px; height: 35px; border: 1px solid #00ff00; z-index: 999; background: #fff; }
    </style>
</head>
<body>

    <div class="header">
        <h2>精准算分模式</h2>
    </div>

    <div class="scanner-container">
        <video id="video" autoplay playsinline muted></video>
        <div class="scan-box" id="scan-box">
            <div class="scan-line"></div>
        </div>
        <!-- 悬浮在右上角的小框，显示处理后的黑白图像，用于调试 -->
        <canvas id="debugCanvas"></canvas>
    </div>

    <div class="result-panel">
        <div class="score-display" id="total-score">0</div>
        <div class="details" id="recognized-numbers">等待稳定识别...</div>
        <div class="status" id="status-text">系统初始化中...</div>
    </div>

    <canvas id="cropCanvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const scanBox = document.getElementById('scan-box');
        const cropCanvas = document.getElementById('cropCanvas');
        const debugCanvas = document.getElementById('debugCanvas');
        const ctx = cropCanvas.getContext('2d', { willReadFrequently: true });
        const debugCtx = debugCanvas.getContext('2d');
        const totalScoreEl = document.getElementById('total-score');
        const detailsEl = document.getElementById('recognized-numbers');
        const statusEl = document.getElementById('status-text');

        let worker = null;
        let isProcessing = false;
        
        // 防抖变量：连续识别几次一样的才算数
        let lastRecognizedString = "";
        let stableCount = 0;
        const REQUIRED_STABLE_COUNT = 2; // 连续2次识别相同才输出

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }
                });
                video.srcObject = stream;
                video.onloadedmetadata = async () => { await initOCR(); };
            } catch (err) {
                alert("摄像头调用失败。");
            }
        }

        async function initOCR() {
            statusEl.innerText = "正在加载 AI 模型...";
            worker = await Tesseract.createWorker('eng');
            await worker.setParameters({
                tessedit_char_whitelist: '0123456789',
                // 改用 PSM 6：假设这是一个统一的文本块，比分散文本更适合处理大数字
                tessedit_pageseg_mode: Tesseract.PSM.SINGLE_BLOCK, 
            });
            statusEl.innerText = "扫描中...请将数字放在红框内";
            setInterval(captureAndRecognize, 800); // 提高抓取频率，但加入防抖机制
        }

        async function captureAndRecognize() {
            if (isProcessing || !worker || video.readyState !== 4) return;
            isProcessing = true;

            try {
                const videoRect = video.getBoundingClientRect();
                const boxRect = scanBox.getBoundingClientRect();
                const scaleX = video.videoWidth / videoRect.width;
                const scaleY = video.videoHeight / videoRect.height;

                const cropW = boxRect.width * scaleX;
                const cropH = boxRect.height * scaleY;

                cropCanvas.width = cropW;
                cropCanvas.height = cropH;

                // 1. 抓取红框图像
                ctx.drawImage(video, (boxRect.left - videoRect.left) * scaleX, (boxRect.top - videoRect.top) * scaleY, cropW, cropH, 0, 0, cropW, cropH);
                
                // 2. 核心魔法：图像预处理（强行黑白高对比反转）
                // AI 喜欢白纸黑字。你的卡牌是绿底白字。
                // 我们要把亮的（白字）变黑，暗的（背景）变白。
                let imgData = ctx.getImageData(0, 0, cropW, cropH);
                let data = imgData.data;
                
                for (let i = 0; i < data.length; i += 4) {
                    let r = data[i], g = data[i+1], b = data[i+2];
                    // 计算亮度
                    let brightness = (r * 299 + g * 587 + b * 114) / 1000;
                    
                    // 阈值判断：如果很亮（说明是白色的数字），就把它涂成纯黑
                    // 否则（绿色背景或阴影桌布），涂成纯白
                    if (brightness > 150) { 
                        data[i] = data[i+1] = data[i+2] = 0;   // 变黑字
                    } else {
                        data[i] = data[i+1] = data[i+2] = 255; // 变白底
                    }
                }
                ctx.putImageData(imgData, 0, 0);

                // 把处理后的画面显示在右上角，方便你调试看效果
                debugCanvas.width = cropW;
                debugCanvas.height = cropH;
                debugCtx.putImageData(imgData, 0, 0);

                const base64Image = cropCanvas.toDataURL('image/png');

                // 3. AI 识别
                const { data: { text } } = await worker.recognize(base64Image);
                processResult(text);

            } catch (err) {
                console.error(err);
            } finally {
                isProcessing = false;
            }
        }

        function processResult(text) {
            const numbers = text.match(/\d+/g);
            
            if (numbers && numbers.length > 0) {
                // 过滤掉大于 20 的离谱数字 (UNO 最大数字是9，特殊牌算20/50，这里设个阈值防止把桌布认成888)
                const validNumbers = numbers.map(num => parseInt(num, 10)).filter(num => num <= 50); 
                
                if (validNumbers.length > 0) {
                    const currentString = validNumbers.join(',');
                    
                    // 防抖逻辑：只有连续识别出一样的结果，才更新界面
                    if (currentString === lastRecognizedString) {
                        stableCount++;
                        if (stableCount >= REQUIRED_STABLE_COUNT) {
                            const sum = validNumbers.reduce((a, b) => a + b, 0);
                            totalScoreEl.innerText = sum;
                            detailsEl.innerText = `锁定识别: [ ${validNumbers.join(' + ')} ]`;
                        }
                    } else {
                        // 如果变了，重新计数
                        lastRecognizedString = currentString;
                        stableCount = 1;
                    }
                }
            } else {
                // 如果没扫到数字，计数器清零，但不立刻清零界面，防止闪烁
                stableCount = 0;
            }
        }

        startCamera();
    </script>
</body>
</html>
